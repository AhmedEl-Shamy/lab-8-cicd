name: Deploy Multi-Container App

on:
  push:
    branches:
      - main  # هيشتغل لما ترفع على فرع main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # هيرفع الصورة لـ Docker Hub باسمك
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/lab6-app:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # ده الجزء اللي بيتنفذ جوه السيرفر بتاعك أوتوماتيك
            cd ~/lab8-cicd || (mkdir ~/lab8-cicd && cd ~/lab8-cicd)
            
            # لو المجلد فاضي هيعمل clone، لو فيه كود هيعمل pull
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone <رابط_مستودعك_هنا> .
            fi
            
            docker compose pull
            docker compose down
            docker compose up -d